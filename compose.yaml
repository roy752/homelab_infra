services:

  portainer:
    image: portainer/portainer-ce:lts

    container_name: portainer

    restart: unless-stopped

    ports:
      - "${PORTAINER_HTTP}:9000"
      - "${PORTAINER_HTTPS}:9443"

    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock

volumes:

  portainer_data: